server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes: 
        - id: ms-auth
          uri: lb://ms-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: ms-inventory
          uri: lb://ms-inventory
          predicates:
            - Path=/api/inventory/**
          filters:
            - StripPrefix=1

        - id: ms-sales
          uri: lb://ms-sales
          predicates:
            - Path=/api/sales/**
          filters:
            - StripPrefix=1
      
        - id: ms-purchases
          uri: lb://ms-purchases
          predicates:
            - Path=/api/purchases/**
          filters:
            - StripPrefix=1
      
        - id: ms-finances
          uri: lb://ms-finances
          predicates:
            - Path=/api/finances/**
          filters:
            - StripPrefix=1

        - id: ms-rrhh
          uri: lb://ms-rrhh
          predicates:
            - Path=/api/rrhh/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty.http.client: DEBUG